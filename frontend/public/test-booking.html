<!DOCTYPE html>
<html>
<head>
    <title>Test Frontend Booking</title>
</head>
<body>
    <h1>Test Frontend Appointment Booking</h1>
    <button onclick="testBooking()">Test Booking</button>
    <div id="results"></div>

    <script>
        async function testBooking() {
            try {
                // Simulate the exact data that the frontend BookService component would send
                const appointmentData = {
                    serviceType: "oil_change",
                    title: "Oil Change",
                    description: "Regular oil and filter change",
                    date: "2026-02-10",
                    time: "14:00",
                    notes: "Test appointment from frontend simulation",
                    priority: "normal",
                    serviceProviderId: 3
                };

                console.log('Sending appointment data:', appointmentData);

                // This simulates what the appointmentService.requestAppointment would do
                const bookingData = {
                    serviceProviderId: appointmentData.serviceProviderId || 3,
                    serviceType: appointmentData.serviceType,
                    title: appointmentData.title || appointmentData.serviceType,
                    description: appointmentData.description || appointmentData.notes || '',
                    scheduledDate: appointmentData.date,
                    scheduledTime: appointmentData.time,
                    customerNotes: appointmentData.notes || '',
                    vehicleId: appointmentData.vehicleId || null,
                    priority: appointmentData.priority || 'normal',
                };

                console.log('Sending booking data:', bookingData);

                const response = await fetch('http://localhost:5001/api/bookings', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-test-mode': 'true'
                    },
                    body: JSON.stringify(bookingData)
                });

                const result = await response.json();
                console.log('Response:', result);

                document.getElementById('results').innerHTML = `
                    <h3>Response (Status: ${response.status}):</h3>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                `;

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('results').innerHTML = `
                    <h3>Error:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }
    </script>
</body>
</html>
