<!DOCTYPE html>
<html>
<head>
    <title>Test Book Appointment</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { margin: 10px; padding: 10px 20px; }
        #result { margin-top: 20px; padding: 10px; background: #f5f5f5; border-radius: 5px; }
        pre { white-space: pre-wrap; }
        .form-group { margin: 10px 0; }
        input, select, textarea { padding: 8px; margin: 5px 0; width: 300px; }
        textarea { height: 80px; }
    </style>
</head>
<body>
    <h1>Test Book Appointment</h1>
    
    <div class="form-group">
        <label>Service Type:</label><br>
        <select id="serviceType">
            <option value="oil_change">Oil Change</option>
            <option value="brake_service">Brake Service</option>
            <option value="tire_service">Tire Service</option>
            <option value="engine_diagnostic">Engine Diagnostic</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>Date:</label><br>
        <input type="date" id="date" value="2024-02-25">
    </div>
    
    <div class="form-group">
        <label>Time:</label><br>
        <input type="time" id="time" value="10:00">
    </div>
    
    <div class="form-group">
        <label>Notes:</label><br>
        <textarea id="notes" placeholder="Additional notes..."></textarea>
    </div>
    
    <button onclick="testBookAppointment()">Book Appointment</button>
    <button onclick="testGetAppointments()">Get Appointments</button>
    
    <div id="result"></div>

    <script>
        async function testBookAppointment() {
            try {
                const serviceType = document.getElementById('serviceType').value;
                const date = document.getElementById('date').value;
                const time = document.getElementById('time').value;
                const notes = document.getElementById('notes').value;
                
                const response = await fetch('http://localhost:5001/api/bookings', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-test-mode': 'true'
                    },
                    body: JSON.stringify({
                        serviceProviderId: 3,
                        serviceType: serviceType,
                        title: serviceType.replace('_', ' ').replace(/\b\w/g, l => l.toUpperCase()),
                        description: notes || 'Test appointment booking',
                        scheduledDate: date,
                        scheduledTime: time,
                        customerNotes: notes,
                        priority: 'normal'
                    })
                });
                
                const data = await response.json();
                document.getElementById('result').innerHTML = '<h3>Book Appointment Result:</h3><pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('result').innerHTML = '<h3>Error:</h3>' + error.message;
            }
        }

        async function testGetAppointments() {
            try {
                const response = await fetch('http://localhost:5001/api/bookings', {
                    headers: {
                        'x-test-mode': 'true'
                    }
                });
                
                const data = await response.json();
                document.getElementById('result').innerHTML = '<h3>Get Appointments Result:</h3><pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('result').innerHTML = '<h3>Error:</h3>' + error.message;
            }
        }
    </script>
</body>
</html>
